name: Mutation testing

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 * * 6"

permissions:
  contents: read

jobs:
  policy-mutations:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mutation environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" "mutmut>=3,<4"
          python -m pip check

      - name: Run decision-logic mutations
        run: >-
          mutmut run
          "trustcheck.policy._apply_suppressions*"
          "trustcheck.indexes.SimpleRepositoryClient.find_dependency_confusion*"
          "trustcheck.policy.evaluate_policy*"
          "trustcheck.remediation._candidate_objective*"
          "trustcheck.remediation._lockfile_hash_validation_from_artifacts*"
          "trustcheck.remediation._root_allows_any_candidate*"

      - name: Export and enforce mutation score
        run: |
          mutmut export-cicd-stats
          python scripts/check_mutation_score.py \
            mutants/mutmut-cicd-stats.json \
            --minimum 80

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-results-${{ github.sha }}
          path: mutants/mutmut-cicd-stats.json
          if-no-files-found: warn
