name: Mutation testing

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 * * 6"

permissions:
  contents: read

jobs:
  policy-mutations:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        group:
          - policy-thresholds
          - plugin-ipc-validation
          - plugin-trust-binding
          - resolver-guard-decisions
          - provenance-identity-matching
          - archive-record-limits
          - remediation-candidates
          - dependency-confusion
          - advisory-merge-schema

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mutation environment
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Resolve mutation group targets
        run: >-
          python scripts/mutation_targets.py
          .github/mutation-groups.toml
          "${{ matrix.group }}"
          > mutation-targets.txt

      - name: Run ${{ matrix.group }} mutations
        run: xargs mutmut run < mutation-targets.txt

      - name: Export and enforce mutation score
        run: |
          mutmut export-cicd-stats
          python scripts/check_mutation_score.py \
            mutants/mutmut-cicd-stats.json \
            --minimum 80

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-results-${{ matrix.group }}-${{ github.sha }}
          path: |
            mutation-targets.txt
            mutants/mutmut-cicd-stats.json
          if-no-files-found: warn
