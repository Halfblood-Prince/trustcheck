name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write
  packages: write

env:
  SETUPTOOLS_SCM_PRETEND_VERSION: ${{ github.ref_name }}
  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_TRUSTCHECK: ${{ github.ref_name }}

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      action_major_tag: ${{ steps.release_version.outputs.major_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Require annotated release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          object_type="$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(objecttype)')"
          if [ "$object_type" != "tag" ]; then
            echo "Release tags must be annotated. Recreate ${TAG_NAME} as an annotated tag." >&2
            exit 1
          fi

      - name: Validate stable release version
        id: release_version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          IFS=. read -r major minor patch extra <<< "$version"
          component_pattern='^(0|[1-9][0-9]*)$'
          if \
            [ -n "$extra" ] || \
            [[ ! "$major" =~ $component_pattern ]] || \
            [[ ! "$minor" =~ $component_pattern ]] || \
            [[ ! "$patch" =~ $component_pattern ]]
          then
            echo "Release tags must use stable semantic version form vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi
          echo "major_tag=v${major}" >> "$GITHUB_OUTPUT"

      - name: Record immutable release ref
        run: |
          echo "Releasing from commit ${GITHUB_SHA}"
          git rev-parse HEAD

  live-integration-freshness:
    needs: verify-tag
    runs-on: ubuntu-latest

    steps:
      - name: Require a recent successful live integration run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest="$(
            gh api \
              --method GET \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/live-integration.yml/runs" \
              -f branch=main \
              -f status=completed \
              -F per_page=1
          )"
          conclusion="$(jq -r '.workflow_runs[0].conclusion // empty' <<< "$latest")"
          completed_at="$(jq -r '.workflow_runs[0].updated_at // empty' <<< "$latest")"
          run_url="$(jq -r '.workflow_runs[0].html_url // empty' <<< "$latest")"
          if [ -z "$completed_at" ]; then
            echo "No completed live integration run exists on main." >&2
            exit 1
          fi
          age_seconds="$((
            $(date -u +%s) - $(date -u -d "$completed_at" +%s)
          ))"
          if [ "$conclusion" != "success" ] || [ "$age_seconds" -gt 172800 ]; then
            echo "Latest live integration run is not a recent success: ${run_url}" >&2
            exit 1
          fi
          echo "Using live integration signal from ${completed_at}: ${run_url}"

  qa:
    needs:
      - verify-tag
      - live-integration-freshness
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .

      - name: Run lint
        run: ruff check src tests scripts

      - name: Run type checks
        run: mypy src

  matrix-build:
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Build package
        shell: bash
        run: |
          python -m build
          python scripts/verify_release_version.py \
            --tag "$GITHUB_REF_NAME" \
            dist/*.whl \
            dist/*.tar.gz

      - name: Prepare package upload directory
        shell: bash
        run: |
          mkdir -p dist/packages
          cp dist/*.whl dist/packages/
          cp dist/*.tar.gz dist/packages/

      - name: Smoke test built distributions in clean environments
        run: python scripts/smoke_test_distribution.py "dist/*.whl" "dist/*.tar.gz"

      - name: Verify archive build without Git metadata
        shell: bash
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

  coverage-build:
    needs: matrix-build
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install coverage tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Run tests with coverage
        run: python -m pytest --cov=trustcheck --cov-report=term-missing --cov-report=xml tests

      - name: Build package
        run: |
          python -m build
          python scripts/verify_release_version.py \
            --tag "$GITHUB_REF_NAME" \
            dist/*.whl \
            dist/*.tar.gz

      - name: Smoke test built distributions in clean environments
        run: python scripts/smoke_test_distribution.py "dist/*.whl" "dist/*.tar.gz"

      - name: Verify archive build without Git metadata
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

      - name: Generate release SBOMs
        run: |
          for artifact in dist/*.whl dist/*.tar.gz; do
            sbom_env="$(mktemp -d)"
            python -m venv "$sbom_env"
            "$sbom_env/bin/python" -m pip install \
              --disable-pip-version-check \
              --require-hashes \
              --requirement requirements/runtime.lock
            "$sbom_env/bin/python" -m pip install \
              --disable-pip-version-check \
              --no-deps \
              "$artifact"
            "$sbom_env/bin/python" -m pip uninstall -y pip setuptools wheel || true
            cyclonedx-py environment "$sbom_env/bin/python" --output-file "${artifact}.cdx.json"
            rm -rf "$sbom_env"
          done

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml-${{ github.sha }}
          path: coverage.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/*

  clam-av:
    needs: coverage-build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install --yes clamav

      - name: Update ClamAV signatures
        run: |
          sudo systemctl stop clamav-freshclam.service 2>/dev/null || true
          sudo freshclam --verbose | tee clamav-signature-update.txt

      - name: Scan release build with ClamAV
        run: |
          set +e
          clamscan \
            --recursive \
            --official-db-only=yes \
            --verbose \
            --log=clamav-scan.txt \
            dist
          scan_status=$?
          set -e
          cat clamav-scan.txt
          if [ "$scan_status" -ne 0 ]; then
            echo "ClamAV scan failed with exit code ${scan_status}." >&2
            exit "$scan_status"
          fi

      - name: Upload ClamAV reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-clamav-reports-${{ github.sha }}
          path: clamav-*.txt
          if-no-files-found: warn

  snap-qa:
    needs: clam-av
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set release version in Snap metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          release_version="${TAG_NAME#v}"
          sed -i -E "s/^version: .*/version: \"${release_version}\"/" snap/snapcraft.yaml
          grep -F "version: \"${release_version}\"" snap/snapcraft.yaml

      - name: Require Snap Store credentials
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -z "$SNAPCRAFT_STORE_CREDENTIALS" ]; then
            echo "Repository secret SNAPCRAFT_STORE_CREDENTIALS is required." >&2
            exit 1
          fi

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1

      - name: Validate Snap Store access
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          snapcraft whoami
          snapcraft status trustcheck

      - name: Lint snap
        env:
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: sudo -u "$USER" -E snapcraft lint "$SNAP_PATH"

      - name: Verify built snap metadata
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: |
          release_version="${RELEASE_VERSION#v}"
          metadata_file="$(mktemp)"
          unsquashfs -cat "$SNAP_PATH" meta/snap.yaml > "$metadata_file"
          grep -Fx "name: trustcheck" "$metadata_file"
          grep -Eq "^version: ['\"]?${release_version}['\"]?$" "$metadata_file"
          grep -Fx "confinement: strict" "$metadata_file"
          grep -F "command: bin/trustcheck" "$metadata_file"

      - name: Install and smoke test snap
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: |
          release_version="${RELEASE_VERSION#v}"
          sudo snap install --dangerous "$SNAP_PATH"
          snap_run_output="$(snap run trustcheck --version)"
          wrapper_output="$(/snap/bin/trustcheck --version)"
          echo "$snap_run_output"
          [[ "$snap_run_output" == "trustcheck ${release_version} (report schema "* ]]
          [[ "$wrapper_output" == "$snap_run_output" ]]
          export PATH="/snap/bin:$PATH"
          test "$(command -v trustcheck)" = "/snap/bin/trustcheck"
          trustcheck --help > /dev/null
          trustcheck inspect sampleproject \
            --version 4.0.0 \
            --format json \
            > snap-verification-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(
              Path("snap-verification-report.json").read_text(encoding="utf-8")
          )
          report = payload["report"]
          assert report["coverage"]["verified_files"] > 0, report["coverage"]
          failures = report["diagnostics"]["artifact_failures"]
          assert not any(
              item["subcode"] == "unexpected_verification_error"
              for item in failures
          ), failures
          PY

      - name: Generate snap checksum
        env:
          SNAP_PATH: ${{ steps.snapcraft.outputs.snap }}
        run: sha256sum "$SNAP_PATH" > "${SNAP_PATH}.sha256"

      - name: Attest snap build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.snapcraft.outputs.snap }}

      - name: Upload verified snap
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: snap-${{ github.sha }}
          path: |
            ${{ steps.snapcraft.outputs.snap }}
            ${{ steps.snapcraft.outputs.snap }}.sha256
          if-no-files-found: error

  build-windows-executable:
    needs: coverage-build
    runs-on: windows-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set standalone release version
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $releaseVersion = $env:TAG_NAME.TrimStart("v")
          "SETUPTOOLS_SCM_PRETEND_VERSION=$releaseVersion" >> $env:GITHUB_ENV
          "SETUPTOOLS_SCM_PRETEND_VERSION_FOR_TRUSTCHECK=$releaseVersion" >> $env:GITHUB_ENV

      - name: Install PyInstaller tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Build standalone Windows executable
        run: python scripts/build_standalone.py

      - name: Authenticode sign and RFC 3161 timestamp executable
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          if (-not $env:WINDOWS_SIGNING_CERTIFICATE_BASE64 -or
              -not $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD) {
            throw "Windows Authenticode signing secrets are required for releases."
          }
          $timestampUrl = if ($env:WINDOWS_TIMESTAMP_URL) {
            $env:WINDOWS_TIMESTAMP_URL
          } else {
            "https://timestamp.digicert.com"
          }
          $certificate = Join-Path $env:RUNNER_TEMP "trustcheck-signing.pfx"
          $binary = (Resolve-Path "dist\standalone\trustcheck.exe").Path
          try {
            [IO.File]::WriteAllBytes(
              $certificate,
              [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64)
            )
            & signtool.exe sign `
              /fd SHA256 `
              /td SHA256 `
              /tr $timestampUrl `
              /f $certificate `
              /p $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD `
              $binary
            if ($LASTEXITCODE -ne 0) {
              throw "Authenticode signing or RFC 3161 timestamping failed."
            }
            & signtool.exe verify /pa /all /v $binary
            if ($LASTEXITCODE -ne 0) {
              throw "Authenticode verification failed."
            }
            $signature = Get-AuthenticodeSignature -FilePath $binary
            if ($signature.Status -ne "Valid" -or -not $signature.TimeStamperCertificate) {
              throw "Executable does not have a valid timestamped Authenticode signature."
            }
          } finally {
            Remove-Item -LiteralPath $certificate -Force -ErrorAction SilentlyContinue
          }

      - name: Smoke test and name release executable
        id: executable
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $binary = (Resolve-Path "dist\standalone\trustcheck.exe").Path
          $releaseVersion = $env:TAG_NAME.TrimStart("v")
          $versionOutput = & $binary --version
          if ($LASTEXITCODE -ne 0) {
            throw "The standalone executable failed its version smoke test."
          }
          if (-not $versionOutput.StartsWith("trustcheck $releaseVersion ")) {
            throw "Executable version '$versionOutput' does not match $releaseVersion."
          }
          & $binary --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "The standalone executable failed its help smoke test."
          }

          New-Item -ItemType Directory -Force "release\windows" | Out-Null
          $releaseName = "trustcheck-$releaseVersion-windows-x86_64.exe"
          $releasePath = Join-Path "release\windows" $releaseName
          Move-Item -LiteralPath $binary -Destination $releasePath
          "path=$releasePath" >> $env:GITHUB_OUTPUT
          "name=$releaseName" >> $env:GITHUB_OUTPUT

      - name: Build unsigned Microsoft Store MSIX
        id: msix
        shell: pwsh
        env:
          EXECUTABLE_PATH: ${{ steps.executable.outputs.path }}
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if (-not $env:MSIX_IDENTITY_NAME -or -not $env:MSIX_PUBLISHER) {
            throw "MSIX_IDENTITY_NAME and MSIX_PUBLISHER repository variables are required."
          }
          $releaseVersion = $env:TAG_NAME.TrimStart("v")
          $layout = Join-Path $env:RUNNER_TEMP "trustcheck-msix-layout"
          $msixName = "trustcheck-$releaseVersion-windows-x86_64-store.msix"
          $msixPath = Join-Path "release\windows" $msixName
          python scripts/build_msix_layout.py `
            --executable $env:EXECUTABLE_PATH `
            --logo "docs\assets\images\logo.png" `
            --layout $layout `
            --version $releaseVersion `
            --identity-name $env:MSIX_IDENTITY_NAME `
            --publisher $env:MSIX_PUBLISHER
          & MakeAppx.exe pack /d $layout /p $msixPath /o
          if ($LASTEXITCODE -ne 0) {
            throw "Microsoft Store MSIX packaging failed."
          }
          "path=$msixPath" >> $env:GITHUB_OUTPUT
          "name=$msixName" >> $env:GITHUB_OUTPUT

      - name: Generate executable checksum
        shell: pwsh
        env:
          EXECUTABLE_NAME: ${{ steps.executable.outputs.name }}
          EXECUTABLE_PATH: ${{ steps.executable.outputs.path }}
        run: |
          $hash = (Get-FileHash $env:EXECUTABLE_PATH -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:EXECUTABLE_NAME" |
            Set-Content -Encoding ascii "$env:EXECUTABLE_PATH.sha256"

      - name: Generate MSIX checksum
        shell: pwsh
        env:
          MSIX_NAME: ${{ steps.msix.outputs.name }}
          MSIX_PATH: ${{ steps.msix.outputs.path }}
        run: |
          $hash = (Get-FileHash $env:MSIX_PATH -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:MSIX_NAME" | Set-Content -Encoding ascii "$env:MSIX_PATH.sha256"

      - name: Attest executable build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.executable.outputs.path }}

      - name: Attest MSIX build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.msix.outputs.path }}

      - name: Upload executable for Microsoft Defender scan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-executable-unscanned-${{ github.sha }}
          path: |
            ${{ steps.executable.outputs.path }}
            ${{ steps.executable.outputs.path }}.sha256
            ${{ steps.msix.outputs.path }}
            ${{ steps.msix.outputs.path }}.sha256
          if-no-files-found: error

  windows-defender-scan:
    needs: build-windows-executable
    runs-on: windows-latest

    steps:
      - name: Download built Windows executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-executable-unscanned-${{ github.sha }}
          path: windows-executable

      - name: Locate built Windows executable
        id: executable
        shell: pwsh
        run: |
          $binary = Get-ChildItem -Path "windows-executable" -Filter "*.exe" -File |
            Select-Object -First 1
          if (-not $binary) {
            throw "The Windows executable from the build job was not found."
          }
          "path=$($binary.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Scanning executable produced by the build job: $($binary.FullName)"

      - name: Locate Microsoft Defender CLI
        id: defender
        shell: pwsh
        run: |
          $platformRoot = Join-Path $env:ProgramData "Microsoft\Windows Defender\Platform"
          $candidates = @()
          if (Test-Path $platformRoot) {
            $candidates += Get-ChildItem -Path $platformRoot -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName "MpCmdRun.exe" }
          }
          $candidates += Join-Path $env:ProgramFiles "Windows Defender\MpCmdRun.exe"
          $defender = $candidates |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $defender) {
            throw "MpCmdRun.exe was not found on the Windows runner."
          }
          "path=$defender" >> $env:GITHUB_OUTPUT
          Write-Host "Using Microsoft Defender CLI: $defender"

      - name: Verify Microsoft Defender is enabled
        shell: pwsh
        run: |
          Set-Service -Name wuauserv -StartupType Manual
          Start-Service -Name wuauserv
          $status = Get-MpComputerStatus
          $status |
            Select-Object AMServiceEnabled, AntivirusEnabled, AntivirusSignatureVersion |
            Format-List |
            Out-File defender-status.txt
          Get-Content defender-status.txt
          if (-not $status.AMServiceEnabled -or -not $status.AntivirusEnabled) {
            throw "Microsoft Defender Antivirus is not enabled on the runner."
          }

      - name: Update Microsoft Defender signatures
        shell: pwsh
        env:
          DEFENDER_CLI: ${{ steps.defender.outputs.path }}
        run: |
          "Microsoft Defender signature update" |
            Set-Content -Path defender-signature-update.txt
          $output = & $env:DEFENDER_CLI -SignatureUpdate 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath defender-signature-update.txt -Append
          if ($exitCode -ne 0) {
            Write-Error "Microsoft Defender signature update failed with exit code $exitCode."
            exit $exitCode
          }

      - name: Scan built executable with Microsoft Defender
        shell: pwsh
        env:
          DEFENDER_CLI: ${{ steps.defender.outputs.path }}
          EXECUTABLE_PATH: ${{ steps.executable.outputs.path }}
        run: |
          "Microsoft Defender custom scan: $env:EXECUTABLE_PATH" |
            Set-Content -Path defender-scan.txt
          $output = & $env:DEFENDER_CLI `
            -Scan `
            -ScanType 3 `
            -File $env:EXECUTABLE_PATH `
            -DisableRemediation 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath defender-scan.txt -Append
          if ($exitCode -ne 0) {
            Write-Error "Microsoft Defender scan failed with exit code $exitCode."
            exit $exitCode
          }

      - name: Regenerate executable checksum after scan
        shell: pwsh
        env:
          EXECUTABLE_PATH: ${{ steps.executable.outputs.path }}
        run: |
          $name = Split-Path -Leaf $env:EXECUTABLE_PATH
          $hash = (Get-FileHash $env:EXECUTABLE_PATH -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $name" | Set-Content -Encoding ascii "$env:EXECUTABLE_PATH.sha256"

      - name: Upload Microsoft Defender reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-defender-reports-${{ github.sha }}
          path: defender-*.txt
          if-no-files-found: warn

      - name: Upload scanned Windows executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-executable-${{ github.sha }}
          path: |
            windows-executable/*.exe
            windows-executable/*.exe.sha256
            windows-executable/*.msix
            windows-executable/*.msix.sha256
          if-no-files-found: error

  windows-clean-install:
    needs: windows-defender-scan
    runs-on: windows-latest

    steps:
      - name: Download scanned Windows distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-executable-${{ github.sha }}
          path: windows-distributions

      - name: Install and smoke test signed executable
        shell: pwsh
        run: |
          $source = Get-ChildItem "windows-distributions" -Filter "*.exe" -File |
            Select-Object -First 1
          $signature = Get-AuthenticodeSignature -FilePath $source.FullName
          if ($signature.Status -ne "Valid" -or -not $signature.TimeStamperCertificate) {
            throw "Downloaded executable signature or timestamp is invalid."
          }
          $installRoot = Join-Path $env:LOCALAPPDATA "Programs\Trustcheck"
          New-Item -ItemType Directory -Force $installRoot | Out-Null
          Copy-Item -LiteralPath $source.FullName -Destination "$installRoot\trustcheck.exe"
          $env:PATH = "$installRoot;$env:PATH"
          trustcheck --help | Out-Null
          trustcheck inspect requests | Out-Null

  test-msix-installation:
    needs: windows-defender-scan
    runs-on: windows-latest

    steps:
      - name: Download Microsoft Store MSIX
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-executable-${{ github.sha }}
          path: windows-distributions

      - name: Test MSIX installation and execution alias
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
        run: |
          $msix = Get-ChildItem "windows-distributions" -Filter "*.msix" -File |
            Select-Object -First 1
          $certificate = New-SelfSignedCertificate `
            -Type Custom `
            -Subject $env:MSIX_PUBLISHER `
            -KeyUsage DigitalSignature `
            -CertStoreLocation "Cert:\CurrentUser\My"
          $plainPassword = [guid]::NewGuid().ToString()
          $password = ConvertTo-SecureString $plainPassword -AsPlainText -Force
          $pfx = Join-Path $env:RUNNER_TEMP "trustcheck-msix-test.pfx"
          $cer = Join-Path $env:RUNNER_TEMP "trustcheck-msix-test.cer"
          try {
            Export-PfxCertificate -Cert $certificate -FilePath $pfx -Password $password |
              Out-Null
            Export-Certificate -Cert $certificate -FilePath $cer | Out-Null
            Import-Certificate -FilePath $cer -CertStoreLocation `
              "Cert:\CurrentUser\TrustedPeople" | Out-Null
            & signtool.exe sign /fd SHA256 /f $pfx /p $plainPassword $msix.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Disposable MSIX test signing failed."
            }
            Add-AppxPackage -Path $msix.FullName
            trustcheck.exe --help | Out-Null
            trustcheck.exe inspect requests | Out-Null
          } finally {
            Get-AppxPackage -Name $env:MSIX_IDENTITY_NAME | Remove-AppxPackage `
              -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $pfx, $cer -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "Cert:\CurrentUser\My\$($certificate.Thumbprint)" `
              -Force -ErrorAction SilentlyContinue
          }

  publish-pypi:
    needs: coverage-build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Prepare package upload directory
        run: |
          mkdir -p dist/packages
          find dist -maxdepth 1 -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/packages/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
          packages-dir: dist/packages
          verbose: true

  publish-docker:
    needs:
      - coverage-build
      - verify-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare Docker image metadata
        id: docker_metadata
        env:
          ACTION_MAJOR_TAG: ${{ needs['verify-tag'].outputs.action_major_tag }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_version="${RELEASE_TAG#v}"
          major_version="${ACTION_MAJOR_TAG#v}"
          {
            echo "tags<<EOF"
            echo "${image}:${RELEASE_TAG}"
            echo "${image}:${release_version}"
            echo "${image}:${ACTION_MAJOR_TAG}"
            echo "${image}:${major_version}"
            echo "${image}:latest"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=Trustcheck"
            echo "org.opencontainers.image.description=Package trust and provenance verification for PyPI consumers."
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${release_version}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish multi-platform Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
          build-args: |
            TRUSTCHECK_VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true

  publish-github-action:
    needs:
      - coverage-build
      - verify-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out released action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Validate action metadata
        run: test -f action.yml

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Create GitHub Release with generated notes
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            Published from immutable commit `${{ github.sha }}`.
            The release workflow publishes PyPI, GitHub Action, Snap Store, and
            GHCR Docker distributions after shared tag verification, QA, matrix,
            and coverage builds.

            Release artifacts:
            - `dist/*`
            - `dist/SHA256SUMS.txt`
            - `dist/*.cdx.json`
            - standalone `trustcheck-*-windows-x86_64.exe` with checksum
            - unsigned `trustcheck-*-store.msix` for Microsoft Store submission
            - GHCR Docker images for `linux/amd64`, `linux/arm64`, and `linux/arm/v7`

            Verify the direct Windows executable before use:

            ```powershell
            Get-AuthenticodeSignature .\trustcheck-*-windows-x86_64.exe | Format-List
            Get-FileHash .\trustcheck-*-windows-x86_64.exe -Algorithm SHA256
            ```

            The Authenticode status must be `Valid`, include a timestamp
            certificate, and match the adjacent `.sha256` file. The Store signs
            the MSIX during submission; the workflow tests its execution alias
            with a disposable certificate before upload.

            GitHub Action:
            - Immutable: `uses: Halfblood-Prince/trustcheck@${{ github.ref_name }}`
            - Compatible major: `uses: Halfblood-Prince/trustcheck@${{ needs['verify-tag'].outputs.action_major_tag }}`
          files: |
            dist/*

      - name: Publish moving major action tag
        env:
          ACTION_MAJOR_TAG: ${{ needs['verify-tag'].outputs.action_major_tag }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          get_endpoint="repos/${GITHUB_REPOSITORY}/git/ref/tags/${ACTION_MAJOR_TAG}"
          update_endpoint="repos/${GITHUB_REPOSITORY}/git/refs/tags/${ACTION_MAJOR_TAG}"

          if gh api "$get_endpoint" > /dev/null 2>&1; then
            gh api \
              --method PATCH \
              "$update_endpoint" \
              -f sha="$GITHUB_SHA" \
              -F force=true \
              > /dev/null
            operation="Updated"
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${ACTION_MAJOR_TAG}" \
              -f sha="$GITHUB_SHA" \
              > /dev/null
            operation="Created"
          fi

          resolved_sha=""
          for attempt in {1..5}; do
            resolved_sha="$(gh api "$get_endpoint" --jq '.object.sha')"
            if [ "$resolved_sha" = "$GITHUB_SHA" ]; then
              break
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep 2
            fi
          done
          if [ "$resolved_sha" != "$GITHUB_SHA" ]; then
            echo "${ACTION_MAJOR_TAG} resolved to ${resolved_sha}, expected ${GITHUB_SHA}." >&2
            exit 1
          fi

          echo "${operation} ${ACTION_MAJOR_TAG} at ${GITHUB_SHA} for ${RELEASE_TAG}."
          {
            echo "## GitHub Action release"
            echo
            echo "- Immutable ref: \`${RELEASE_TAG}\`"
            echo "- Moving compatible ref: \`${ACTION_MAJOR_TAG}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record Marketplace association step
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          {
            echo
            echo "### Marketplace"
            echo
            echo "GitHub requires Marketplace association in the release web UI."
            echo "[Edit ${RELEASE_TAG} and select **Publish this Action to the GitHub Marketplace**](https://github.com/${GITHUB_REPOSITORY}/releases/edit/${RELEASE_TAG})."
          } >> "$GITHUB_STEP_SUMMARY"

  upload-windows-executable:
    needs:
      - windows-defender-scan
      - windows-clean-install
      - test-msix-installation
      - publish-github-action
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: windows-executable-${{ github.sha }}
          path: windows-executable

      - name: Attach executable to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            windows-executable/* \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

  publish-snap:
    needs: snap-qa
    runs-on: ubuntu-latest

    steps:
      - name: Download verified snap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: snap-${{ github.sha }}
          path: snap-artifact

      - name: Locate snap
        id: snap
        run: |
          snap_path="$(find snap-artifact -maxdepth 1 -type f -name '*.snap' -print -quit)"
          if [ -z "$snap_path" ]; then
            echo "Verified snap artifact was not found." >&2
            exit 1
          fi
          echo "path=$snap_path" >> "$GITHUB_OUTPUT"

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Publish to Snap Store stable
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.path }}
          release: stable

      - name: Update Snap Store listing metadata
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          SNAP_PATH: ${{ steps.snap.outputs.path }}
        run: snapcraft upload-metadata "$SNAP_PATH" --force
