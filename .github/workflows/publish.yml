name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Require annotated release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          object_type="$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(objecttype)')"
          if [ "$object_type" != "tag" ]; then
            echo "Release tags must be annotated. Recreate ${TAG_NAME} as an annotated tag." >&2
            exit 1
          fi

      - name: Record immutable release ref
        run: |
          echo "Releasing from commit ${GITHUB_SHA}"
          git rev-parse HEAD

  ci:
    needs: verify-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build mypy pytest ruff

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest -q tests

      - name: Run lint
        run: ruff check src tests

      - name: Run type checks
        run: mypy src

      - name: Build package
        run: python -m build

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          trustcheck --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/*

  publish:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true

  github-release:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Create GitHub Release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          append_body: true
          body: |
            Published from immutable commit `${{ github.sha }}`.

            Release artifacts:
            - `dist/*`
            - `dist/SHA256SUMS.txt`
          files: |
            dist/*
            dist/SHA256SUMS.txt
