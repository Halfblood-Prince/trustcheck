name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Require annotated release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          object_type="$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(objecttype)')"
          if [ "$object_type" != "tag" ]; then
            echo "Release tags must be annotated. Recreate ${TAG_NAME} as an annotated tag." >&2
            exit 1
          fi

      - name: Record immutable release ref
        run: |
          echo "Releasing from commit ${GITHUB_SHA}"
          git rev-parse HEAD

  qa:
    needs: verify-tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . mypy ruff

      - name: Run lint
        run: ruff check src tests

      - name: Run type checks
        run: mypy src

  test-matrix:
    needs: verify-tag
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Build package
        run: python -m build

      - name: Prepare package upload directory
        run: |
          mkdir -p dist/packages
          cp dist/*.whl dist/packages/
          cp dist/*.tar.gz dist/packages/

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          trustcheck --help

  coverage-build:
    needs:
      - qa
      - test-matrix
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install coverage tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest pytest-cov coverage cyclonedx-bom

      - name: Run tests with coverage
        run: python -m pytest --cov=trustcheck --cov-report=term-missing --cov-report=xml tests

      - name: Build package
        run: python -m build

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          trustcheck --help

      - name: Generate SBOM
        run: cyclonedx-py environment --output-file dist/trustcheck-sbom.json

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/*

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ github.sha }}
          path: coverage.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/*

  publish:
    needs: coverage-build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          packages-dir: dist/packages
          verbose: true

  github-release:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist

      - name: Create GitHub Release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          append_body: true
          body: |
            Published from immutable commit `${{ github.sha }}`.
            Published via PyPI Trusted Publishing with artifact attestations enabled.

            Release artifacts:
            - `dist/*`
            - `dist/SHA256SUMS.txt`
            - `dist/trustcheck-sbom.json`
          files: |
            dist/*
            dist/SHA256SUMS.txt
            dist/trustcheck-sbom.json
