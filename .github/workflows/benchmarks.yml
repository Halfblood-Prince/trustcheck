name: Benchmarks

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write

jobs:
  pip-audit-comparison:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install . pip-audit
      - run: >-
          python benchmarks/benchmark_against_pip_audit.py
          --warmups 1
          --iterations 5
          --output benchmarks/results/latest.json
      - run: >-
          python scripts/update_benchmark_table.py
          benchmarks/results/latest.json
          --readme README.md
      - name: Commit benchmark result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md benchmarks/results/latest.json
          if git diff --cached --quiet; then
            echo "Benchmark table is already up to date."
          else
            git commit -m "Update benchmark results"
            git push
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: trustcheck-pip-audit-benchmark-${{ github.sha }}
          path: benchmarks/results/latest.json
          if-no-files-found: error
