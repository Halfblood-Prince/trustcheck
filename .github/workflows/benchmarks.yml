name: Benchmarks

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - benchmarks/results/latest.json
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: benchmark-results
  cancel-in-progress: false

jobs:
  pip-audit-comparison:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: ${{ github.event_name != 'pull_request' }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install . pip-audit==2.10.1 psutil
      - name: Verify published benchmark signature
        run: >-
          python scripts/benchmark_signature.py
          benchmarks/results/latest.json
          --signature benchmarks/results/latest.json.sig
          --public-key benchmarks/results/benchmark-public-key.pem
      - run: >-
          python benchmarks/benchmark_against_pip_audit.py
          --warmups 1
          --iterations 5
          --evidence-iterations 5
          --output benchmarks/results/latest.json
      - run: >-
          python scripts/update_benchmark_table.py
          benchmarks/results/latest.json
          --readme README.md
      - name: Sign benchmark result
        if: github.event_name != 'pull_request'
        env:
          BENCHMARK_SIGNING_KEY_PEM: ${{ secrets.BENCHMARK_SIGNING_KEY_PEM }}
        run: >-
          python scripts/benchmark_signature.py
          benchmarks/results/latest.json
          --signature benchmarks/results/latest.json.sig
          --private-key-env BENCHMARK_SIGNING_KEY_PEM
      - name: Verify generated benchmark signature
        if: github.event_name != 'pull_request'
        run: >-
          python scripts/benchmark_signature.py
          benchmarks/results/latest.json
          --signature benchmarks/results/latest.json.sig
          --public-key benchmarks/results/benchmark-public-key.pem
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trustcheck-pip-audit-benchmark-${{ github.sha }}
          path: |
            benchmarks/results/latest.json
            benchmarks/results/latest.json.sig
            benchmarks/results/benchmark-public-key.pem
          if-no-files-found: error
          retention-days: 90
      - name: Open benchmark result pull request
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md benchmarks/results/latest.json benchmarks/results/latest.json.sig
          if git diff --cached --quiet; then
            echo "Benchmark table is already up to date."
          else
            branch="automation/benchmark-results"
            git fetch --no-tags origin "+refs/heads/${branch}:refs/remotes/origin/${branch}" || true
            git switch -c "$branch"
            git commit -m "Update benchmark results"
            git push --force-with-lease origin "HEAD:refs/heads/${branch}"

            title="Update benchmark results"
            body="Automated benchmark results generated from commit ${GITHUB_SHA}."
            pr_number="$(
              gh pr list \
                --base main \
                --head "$branch" \
                --state open \
                --json number \
                --jq '.[0].number'
            )"
            if [[ -n "$pr_number" ]]; then
              gh pr edit "$pr_number" --title "$title" --body "$body"
            else
              gh pr create \
                --base main \
                --head "$branch" \
                --title "$title" \
                --body "$body"
            fi
          fi
