name: Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-results-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pip-audit-comparison:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install . pip-audit==2.10.1 psutil
      - name: Run benchmark
        run: >-
          python benchmarks/benchmark_against_pip_audit.py
          --warmups 1
          --iterations 5
          --evidence-iterations 5
          --output benchmarks/results/latest.json
      - name: Present benchmark results
        shell: bash
        run: |
          python scripts/update_benchmark_table.py \
            benchmarks/results/latest.json \
            --readme README.md
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          from pathlib import Path

          start_marker = "<!-- trustcheck-benchmark:start -->"
          end_marker = "<!-- trustcheck-benchmark:end -->"
          readme = Path("README.md").read_text(encoding="utf-8")
          start = readme.index(start_marker) + len(start_marker)
          end = readme.index(end_marker, start)
          print(readme[start:end].strip())
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trustcheck-pip-audit-benchmark-${{ github.sha }}
          path: benchmarks/results/latest.json
          if-no-files-found: error
          retention-days: 90
