name: Source Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-build-without-git:
    name: Source Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build from source tree without Git metadata
        shell: bash
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

      - name: Smoke test built sdist
        shell: bash
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --outdir "$archive_root/dist" "$archive_root"
          python -m pip install --force-reinstall "$archive_root"/dist/*.tar.gz
          trustcheck --help
