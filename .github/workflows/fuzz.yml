name: Adversarial fuzzing

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "43 3 * * 0"

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_requirements
          - fuzz_lockfiles
          - fuzz_provenance
          - fuzz_artifacts
          - fuzz_exports
          - fuzz_indexes
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install . atheris==3.0.0
          python -m pip check
      - name: Fuzz ${{ matrix.target }}
        run: >-
          python fuzz/${{ matrix.target }}.py
          -runs=1000
          -max_len=65536
          -timeout=10
