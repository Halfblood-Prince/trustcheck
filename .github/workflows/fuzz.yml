name: Adversarial fuzzing

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "43 3 * * 0"

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_requirements
          - fuzz_lockfiles
          - fuzz_provenance
          - fuzz_artifacts
          - fuzz_exports
          - fuzz_indexes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install . atheris==3.0.0
          python -m pip check
      - name: Fuzz ${{ matrix.target }}
        run: >-
          python fuzz/${{ matrix.target }}.py
          -runs=1000
          -max_len=65536
          -timeout=10
