name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pip-audit cyclonedx-bom

      - name: Dependency audit
        run: python -m pip_audit

      - name: Generate SBOM
        run: cyclonedx-py environment --output-file trustcheck-sbom.json

      - name: Upload SBOM preview
        uses: actions/upload-artifact@v7
        with:
          name: sbom-preview
          path: trustcheck-sbom.json

      - name: Secret scan
        uses: gacts/gitleaks@v1
        with:
          path: .

  qa:
    needs: security-scans
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . mypy ruff

      - name: Run lint
        run: ruff check src tests

      - name: Run type checks
        run: mypy src

  test-matrix:
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Build package
        run: python -m build

      - name: Smoke test built wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          trustcheck --help

      - name: Smoke test built sdist
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.tar.gz
          trustcheck --help

      - name: Verify archive build without Git metadata
        shell: bash
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

  coverage:
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install coverage tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . build pytest pytest-cov coverage

      - name: Run tests with coverage
        run: python -m pytest --cov=trustcheck --cov-report=term-missing --cov-report=xml tests

      - name: Build package
        run: python -m build

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          trustcheck --help

      - name: Smoke test built sdist
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.tar.gz
          trustcheck --help

      - name: Verify archive build without Git metadata
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
