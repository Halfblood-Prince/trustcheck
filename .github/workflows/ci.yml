name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install security tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Dependency audit
        shell: bash
        run: |
          mapfile -t audit_ignore_args < <(
            python scripts/check_audit_exceptions.py \
              .github/audit-exceptions.json \
              --emit-pip-audit-args
          )
          python -m pip_audit --skip-editable "${audit_ignore_args[@]}"

      - name: Generate SBOM preview
        run: |
          python -m build --wheel --outdir sbom-dist
          sbom_env="$(mktemp -d)"
          python -m venv "$sbom_env"
          "$sbom_env/bin/python" -m pip install \
            --disable-pip-version-check \
            --require-hashes \
            --requirement requirements/runtime.lock
          "$sbom_env/bin/python" -m pip install \
            --disable-pip-version-check \
            --no-deps \
            sbom-dist/*.whl
          "$sbom_env/bin/python" -m pip uninstall -y pip setuptools wheel || true
          cyclonedx-py environment "$sbom_env/bin/python" --output-file trustcheck-sbom.json

      - name: Upload SBOM preview
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-preview
          path: trustcheck-sbom.json

      - name: Secret scan
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873 # v1
        with:
          path: .

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          deny-licenses: AGPL-1.0, AGPL-3.0, GPL-2.0, GPL-3.0

  qa:
    needs: security-scans
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Verify published benchmark signature
        run: >-
          python scripts/benchmark_signature.py
          benchmarks/results/latest.json
          --signature benchmarks/results/latest.json.sig
          --public-key benchmarks/results/benchmark-public-key.pem

      - name: Run lint
        run: ruff check src tests scripts

      - name: Run type checks
        run: mypy src

  test-matrix:
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Build package
        run: python -m build

      - name: Validate distribution artifact contents
        run: python scripts/validate_distribution_artifacts.py "dist/*.whl" "dist/*.tar.gz"

      - name: Test built sdist source tree
        shell: bash
        run: |
          sdist_root="$(mktemp -d)"
          tar -xf dist/*.tar.gz -C "$sdist_root" --strip-components=1
          cd "$sdist_root"
          python -m pytest -q tests/test_release_version.py

      - name: Smoke test built distributions in clean environments
        run: python scripts/smoke_test_distribution.py "dist/*.whl" "dist/*.tar.gz"

      - name: Verify archive build without Git metadata
        shell: bash
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

  dependency-bounds:
    needs: qa
    strategy:
      fail-fast: false
      matrix:
        include:
          - dependency-set: lowest-supported
            python-version: "3.11"
          - dependency-set: latest-compatible
            python-version: "3.14"
    name: Dependencies (${{ matrix.dependency-set }})
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Generate lowest-supported constraints
        if: matrix.dependency-set == 'lowest-supported'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "packaging>=24,<27"
          python scripts/dependency_bounds.py --extra test > lowest-constraints.txt

      - name: Install lowest-supported dependencies
        if: matrix.dependency-set == 'lowest-supported'
        run: |
          python -m pip install -c lowest-constraints.txt -e ".[test]" build pytest
          python -m pip check

      - name: Install latest-compatible dependencies
        if: matrix.dependency-set == 'latest-compatible'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --upgrade-strategy eager -e ".[test]" build pytest
          python -m pip check

      - name: Run test suite
        run: python -m pytest -q tests

  docker-build-smoke-test:
    needs: qa
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build Docker image
        run: docker build --build-arg TRUSTCHECK_VERSION=0.0.0+docker -t trustcheck:ci .

      - name: Smoke test Docker image
        run: |
          docker run --rm trustcheck:ci --version
          docker run --rm trustcheck:ci --help

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Prepare CI Docker image metadata
        id: docker_metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "tags<<EOF"
            echo "${image}:main"
            echo "${image}:sha-${GITHUB_SHA}"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=Trustcheck"
            echo "org.opencontainers.image.description=Package trust and provenance verification for PyPI consumers."
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=main"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish CI Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker_metadata.outputs.tags }}
          labels: ${{ steps.docker_metadata.outputs.labels }}
          build-args: |
            TRUSTCHECK_VERSION=0.0.0+docker
          provenance: mode=max
          sbom: true

  coverage:
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install coverage tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=trustcheck \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json:coverage.json \
            tests

      - name: Generate coverage badge
        run: |
          python scripts/update_coverage_badge.py \
            coverage.json \
            coverage-badge/coverage.svg

      - name: Build package
        run: python -m build

      - name: Validate distribution artifact contents
        run: python scripts/validate_distribution_artifacts.py "dist/*.whl" "dist/*.tar.gz"

      - name: Smoke test built distributions in clean environments
        run: python scripts/smoke_test_distribution.py "dist/*.whl" "dist/*.tar.gz"

      - name: Verify archive build without Git metadata
        run: |
          archive_root="$(mktemp -d)"
          tar \
            --exclude=.git \
            --exclude=build \
            --exclude=dist \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.tmp-build \
            -cf - . | tar -xf - -C "$archive_root"
          python -m build --sdist --wheel --outdir "$archive_root/dist" "$archive_root"

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.json
            coverage-badge/coverage.svg

  publish-coverage-badge:
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-reports
          path: coverage-artifacts

      - name: Publish coverage badge branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          publish_root="$(mktemp -d)"
          git -C "$publish_root" init
          git -C "$publish_root" config user.name "github-actions[bot]"
          git -C "$publish_root" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$publish_root" remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$publish_root" fetch --depth=1 origin coverage-badge
          if ! git -C "$publish_root" show FETCH_HEAD:PyPI.png > "$publish_root/PyPI.png"; then
            printf '%s\n' \
              "PyPI.png is missing from coverage-badge; refusing to replace the asset branch" \
              "without it." >&2
            exit 1
          fi
          cp coverage-artifacts/coverage-badge/coverage.svg "$publish_root/coverage.svg"
          git -C "$publish_root" add PyPI.png coverage.svg
          git -C "$publish_root" commit -m "Update coverage badge for ${GITHUB_SHA}"
          git -C "$publish_root" branch -M coverage-badge
          git -C "$publish_root" push --force origin coverage-badge
