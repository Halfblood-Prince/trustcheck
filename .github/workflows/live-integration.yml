name: Live integration

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: read

concurrency:
  group: live-integration-main
  cancel-in-progress: false

jobs:
  live-upstreams:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          python -m pip check

      - name: Test live PyPI, provenance, advisories, and snapshots
        env:
          TRUSTCHECK_RUN_LIVE: "1"
        run: python -m pytest -q tests/test_integration_live.py
