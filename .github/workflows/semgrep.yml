name: Semgrep

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "43 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/python --config p/security-audit --error --metrics=off .
