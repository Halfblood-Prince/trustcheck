name: SARIF integration

on:
  workflow_dispatch:
  schedule:
    - cron: "47 3 * * 3"

permissions:
  contents: read
  security-events: write

jobs:
  upload-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Trustcheck
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --requirement requirements/ci.lock
          python -m pip install --disable-pip-version-check --no-build-isolation --no-deps .
          python -m pip check

      - name: Generate equivalent vulnerable-fixture SARIF reports
        run: |
          trustcheck scan \
            --file tests/fixtures/requirements-vulnerable.txt \
            --no-deps \
            --fast \
            --with-osv \
            --fail-on-vulnerability ignore \
            --format sarif \
            --output-file trustcheck-first.sarif
          trustcheck scan \
            --file tests/fixtures/requirements-vulnerable.txt \
            --no-deps \
            --fast \
            --with-osv \
            --fail-on-vulnerability ignore \
            --format sarif \
            --output-file trustcheck-second.sarif

      - name: Validate GitHub SARIF and stable fingerprints
        run: >-
          python scripts/validate_sarif.py
          trustcheck-first.sarif
          --compare trustcheck-second.sarif

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trustcheck-first.sarif
          category: trustcheck-sarif-integration
