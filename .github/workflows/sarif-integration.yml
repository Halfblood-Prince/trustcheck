name: SARIF integration

on:
  workflow_dispatch:
  schedule:
    - cron: "47 3 * * 3"

permissions:
  contents: read
  security-events: write

jobs:
  upload-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Trustcheck
        run: |
          python -m pip install .
          python -m pip check

      - name: Generate equivalent vulnerable-fixture SARIF reports
        run: |
          trustcheck scan \
            --file tests/fixtures/requirements-vulnerable.txt \
            --no-deps \
            --fast \
            --with-osv \
            --fail-on-vulnerability ignore \
            --format sarif \
            --output-file trustcheck-first.sarif
          trustcheck scan \
            --file tests/fixtures/requirements-vulnerable.txt \
            --no-deps \
            --fast \
            --with-osv \
            --fail-on-vulnerability ignore \
            --format sarif \
            --output-file trustcheck-second.sarif

      - name: Validate GitHub SARIF and stable fingerprints
        run: >-
          python scripts/validate_sarif.py
          trustcheck-first.sarif
          --compare trustcheck-second.sarif

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trustcheck-first.sarif
          category: trustcheck-sarif-integration
