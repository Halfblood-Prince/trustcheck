[build-system]
requires = ["setuptools>=68", "setuptools-scm[toml]>=8", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trustcheck"
dynamic = ["version"]
description = "Package trust and provenance verification for PyPI consumers."
readme = "README.md"
requires-python = ">=3.10"
keywords = ["pypi", "security", "supply-chain", "provenance", "attestations"]
license = { file = "LICENSE" }
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
]
dependencies = [
  "pypi-attestations>=0.0.29,<1",
]

[project.scripts]
trustcheck = "trustcheck.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
local_scheme = "no-local-version"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.10"
files = ["src"]
strict = true
warn_unused_configs = true
pretty = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["trustcheck"]

[tool.coverage.report]
fail_under = 90
show_missing = true
skip_covered = true
