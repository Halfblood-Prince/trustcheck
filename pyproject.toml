[build-system]
requires = ["setuptools>=68", "setuptools-scm[toml]>=8", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "trustcheck"
dynamic = ["version"]
description = "Package trust and provenance verification for PyPI consumers."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "BSD 3-Clause License" }
keywords = ["pypi", "security", "supply-chain", "provenance", "attestations"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: BSD 3-Clause License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Topic :: Software Development :: Build Tools",
]
dependencies = [
  "pypi-attestations>=0.0.29,<1",
]

[project.scripts]
trustcheck = "trustcheck.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
version_scheme = "no-guess-dev"
local_scheme = "no-local-version"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.10"
files = ["src"]
strict = true
warn_unused_configs = true
pretty = true
