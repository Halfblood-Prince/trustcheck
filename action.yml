name: TrustCheck Package Scanner
description: Scan PyPI packages and Python dependency files with trust, provenance, and policy checks.
author: Halfblood-Prince

branding:
  icon: shield
  color: blue

inputs:
  target:
    description: Package name or path to requirements.txt, pyproject.toml, pylock.toml, Pipfile.lock, uv.lock, poetry.lock, or pdm.lock.
    required: true
  policy:
    description: Built-in policy bundle or path to a custom JSON policy file.
    required: false
    default: default
  expected-repo:
    description: Expected source repository URL for a package target.
    required: false
    default: ""
  trusted-publisher-organizations:
    description: Whitespace- or newline-separated [provider:]organization publisher allowlist entries.
    required: false
    default: ""
  with-osv:
    description: Query OSV for additional vulnerability records.
    required: false
    default: "false"
  osv-urls:
    description: Whitespace- or newline-separated custom OSV-compatible API base URLs.
    required: false
    default: ""
  with-ecosystems:
    description: Query the Ecosyste.ms OSV-compatible advisory service.
    required: false
    default: "false"
  with-kev:
    description: Enrich CVEs with the CISA Known Exploited Vulnerabilities catalog.
    required: false
    default: "false"
  with-epss:
    description: Enrich CVEs with FIRST EPSS scores and percentiles.
    required: false
    default: "false"
  with-deps:
    description: Inspect direct runtime dependencies.
    required: false
    default: "false"
  with-transitive-deps:
    description: Inspect direct and transitive runtime dependencies.
    required: false
    default: "false"
  inspect-artifacts:
    description: Statically inspect downloaded wheel and sdist contents.
    required: false
    default: "false"
  index-url:
    description: Primary PEP 503/691 Simple Repository index URL.
    required: false
    default: ""
  extra-index-urls:
    description: Whitespace- or newline-separated additional Simple Repository index URLs.
    required: false
    default: ""
  keyring-provider:
    description: Keyring authentication mode (auto, disabled, import, or subprocess).
    required: false
    default: auto
  allow-dependency-confusion:
    description: Continue after reporting a project-name collision across configured indexes.
    required: false
    default: "false"
  trusted-projects:
    description: Whitespace- or newline-separated project names added to the typosquatting reference set.
    required: false
    default: ""
  workers:
    description: Concurrent scan, advisory, and network workers (1-64, or -1 for all available CPU cores).
    required: false
    default: "8"
  sandbox:
    description: Resolver isolation mode (off, warn, auto, container, bubblewrap, or strict).
    required: false
    default: strict
  sandbox-image:
    description: Digest-pinned OCI image used by the container resolver sandbox.
    required: false
    default: ""
  advisory-snapshots:
    description: Whitespace- or newline-separated advisory snapshot paths.
    required: false
    default: ""
  write-advisory-snapshot:
    description: Path for a merged reusable advisory snapshot.
    required: false
    default: ""
  max-advisory-age:
    description: Maximum accepted advisory snapshot age in hours.
    required: false
    default: "168"
  advisory-snapshot-identity:
    description: Trusted Sigstore certificate identity for advisory snapshots.
    required: false
    default: ""
  advisory-snapshot-issuer:
    description: Expected OIDC issuer for the advisory snapshot signer.
    required: false
    default: ""
  sign-advisory-snapshot:
    description: Sign written advisory snapshots using ambient Sigstore identity.
    required: false
    default: "false"
  allow-unsigned-advisory-snapshot:
    description: Explicitly allow unsigned advisory snapshot compatibility mode.
    required: false
    default: "false"
  resume-state:
    description: Checkpoint path used to resume matching dependency-file scans.
    required: false
    default: ""
  enable-plugins:
    description: Enable installed trustcheck entry-point plugins.
    required: false
    default: "false"
  plugins:
    description: Whitespace- or newline-separated [kind:]name plugin allowlist.
    required: false
    default: ""
  plugin-config:
    description: JSON configuration path keyed by plugin name.
    required: false
    default: ""
  remediation:
    description: Remediation mode for dependency files (none, plan, or fix).
    required: false
    default: none
  dry-run:
    description: Regenerate and validate the exact fix patch without modifying files.
    required: false
    default: "false"
  allow-constraint-changes:
    description: Permit minimal declared-range changes when secure versions are excluded.
    required: false
    default: "false"
  source-manifest:
    description: Source requirements or pyproject.toml used to regenerate a lockfile.
    required: false
    default: ""
  remediation-path:
    description: Path for the machine-readable remediation patch bundle.
    required: false
    default: trustcheck-remediation.json
  max-fix-attempts:
    description: Maximum candidate resolutions used to prove a minimal secure fix.
    required: false
    default: "256"
  create-pr:
    description: Create a pull request for a validated fix using git and gh.
    required: false
    default: "false"
  pr-base:
    description: Optional pull request base branch.
    required: false
    default: ""
  pr-branch:
    description: Optional pull request head branch.
    required: false
    default: ""
  pr-title:
    description: Optional pull request title.
    required: false
    default: ""
  pr-ready:
    description: Create a ready-for-review pull request instead of a draft.
    required: false
    default: "false"
  format:
    description: Report format (text, json, sarif, cyclonedx-json, cyclonedx-xml, spdx-json, openvex, or markdown).
    required: false
    default: text
  report-path:
    description: Report path relative to the caller workspace; defaults to an extension appropriate for the selected format.
    required: false
    default: ""
  artifact-name:
    description: Name of the uploaded workflow artifact.
    required: false
    default: trustcheck-report
  python-version:
    description: Python version used to run trustcheck.
    required: false
    default: "3.12"

outputs:
  recommendation:
    description: Overall trustcheck recommendation.
    value: ${{ steps.trustcheck.outputs.recommendation }}
  policy-passed:
    description: Whether the configured trustcheck policy passed.
    value: ${{ steps.trustcheck.outputs['policy-passed'] }}
  report-path:
    description: Absolute path to the generated report.
    value: ${{ steps.trustcheck.outputs['report-path'] }}
  remediation-status:
    description: Remediation result status.
    value: ${{ steps.trustcheck.outputs['remediation-status'] }}
  applied-fixes:
    description: Number of dependency upgrades in the validated remediation.
    value: ${{ steps.trustcheck.outputs['applied-fixes'] }}
  patch-path:
    description: Absolute path to the remediation patch bundle.
    value: ${{ steps.trustcheck.outputs['patch-path'] }}
  pr-branch:
    description: Pull request branch created by remediation.
    value: ${{ steps.trustcheck.outputs['pr-branch'] }}
  pr-url:
    description: Pull request URL created by remediation.
    value: ${{ steps.trustcheck.outputs['pr-url'] }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install trustcheck
      shell: bash
      env:
        TRUSTCHECK_ACTION_REF: ${{ github.action_ref }}
      run: |
        action_ref="${TRUSTCHECK_ACTION_REF:-}"
        if [[ "$action_ref" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          release_version="${action_ref#v}"
          export SETUPTOOLS_SCM_PRETEND_VERSION="$release_version"
          export SETUPTOOLS_SCM_PRETEND_VERSION_FOR_TRUSTCHECK="$release_version"
        fi
        python -m pip install \
          --disable-pip-version-check \
          --require-hashes \
          --requirement "$GITHUB_ACTION_PATH/requirements/action.lock"
        python -m pip install \
          --disable-pip-version-check \
          --no-build-isolation \
          --no-deps \
          "$GITHUB_ACTION_PATH"

    - name: Run trustcheck
      id: trustcheck
      continue-on-error: true
      shell: bash
      env:
        TRUSTCHECK_ACTION_TARGET: ${{ inputs.target }}
        TRUSTCHECK_ACTION_POLICY: ${{ inputs.policy }}
        TRUSTCHECK_ACTION_EXPECTED_REPO: ${{ inputs['expected-repo'] }}
        TRUSTCHECK_ACTION_TRUSTED_PUBLISHER_ORGANIZATIONS: ${{ inputs['trusted-publisher-organizations'] }}
        TRUSTCHECK_ACTION_WITH_OSV: ${{ inputs['with-osv'] }}
        TRUSTCHECK_ACTION_OSV_URLS: ${{ inputs['osv-urls'] }}
        TRUSTCHECK_ACTION_WITH_ECOSYSTEMS: ${{ inputs['with-ecosystems'] }}
        TRUSTCHECK_ACTION_WITH_KEV: ${{ inputs['with-kev'] }}
        TRUSTCHECK_ACTION_WITH_EPSS: ${{ inputs['with-epss'] }}
        TRUSTCHECK_ACTION_WITH_DEPS: ${{ inputs['with-deps'] }}
        TRUSTCHECK_ACTION_WITH_TRANSITIVE_DEPS: ${{ inputs['with-transitive-deps'] }}
        TRUSTCHECK_ACTION_INSPECT_ARTIFACTS: ${{ inputs['inspect-artifacts'] }}
        TRUSTCHECK_ACTION_INDEX_URL: ${{ inputs['index-url'] }}
        TRUSTCHECK_ACTION_EXTRA_INDEX_URLS: ${{ inputs['extra-index-urls'] }}
        TRUSTCHECK_ACTION_KEYRING_PROVIDER: ${{ inputs['keyring-provider'] }}
        TRUSTCHECK_ACTION_ALLOW_DEPENDENCY_CONFUSION: ${{ inputs['allow-dependency-confusion'] }}
        TRUSTCHECK_ACTION_TRUSTED_PROJECTS: ${{ inputs['trusted-projects'] }}
        TRUSTCHECK_ACTION_WORKERS: ${{ inputs['workers'] }}
        TRUSTCHECK_ACTION_SANDBOX: ${{ inputs['sandbox'] }}
        TRUSTCHECK_ACTION_SANDBOX_IMAGE: ${{ inputs['sandbox-image'] }}
        TRUSTCHECK_ACTION_ADVISORY_SNAPSHOTS: ${{ inputs['advisory-snapshots'] }}
        TRUSTCHECK_ACTION_WRITE_ADVISORY_SNAPSHOT: ${{ inputs['write-advisory-snapshot'] }}
        TRUSTCHECK_ACTION_MAX_ADVISORY_AGE: ${{ inputs['max-advisory-age'] }}
        TRUSTCHECK_ACTION_ADVISORY_SNAPSHOT_IDENTITY: ${{ inputs['advisory-snapshot-identity'] }}
        TRUSTCHECK_ACTION_ADVISORY_SNAPSHOT_ISSUER: ${{ inputs['advisory-snapshot-issuer'] }}
        TRUSTCHECK_ACTION_SIGN_ADVISORY_SNAPSHOT: ${{ inputs['sign-advisory-snapshot'] }}
        TRUSTCHECK_ACTION_ALLOW_UNSIGNED_ADVISORY_SNAPSHOT: ${{ inputs['allow-unsigned-advisory-snapshot'] }}
        TRUSTCHECK_ACTION_RESUME_STATE: ${{ inputs['resume-state'] }}
        TRUSTCHECK_ACTION_ENABLE_PLUGINS: ${{ inputs['enable-plugins'] }}
        TRUSTCHECK_ACTION_PLUGINS: ${{ inputs.plugins }}
        TRUSTCHECK_ACTION_PLUGIN_CONFIG: ${{ inputs['plugin-config'] }}
        TRUSTCHECK_ACTION_REMEDIATION: ${{ inputs.remediation }}
        TRUSTCHECK_ACTION_DRY_RUN: ${{ inputs['dry-run'] }}
        TRUSTCHECK_ACTION_ALLOW_CONSTRAINT_CHANGES: ${{ inputs['allow-constraint-changes'] }}
        TRUSTCHECK_ACTION_SOURCE_MANIFEST: ${{ inputs['source-manifest'] }}
        TRUSTCHECK_ACTION_REMEDIATION_PATH: ${{ inputs['remediation-path'] }}
        TRUSTCHECK_ACTION_MAX_FIX_ATTEMPTS: ${{ inputs['max-fix-attempts'] }}
        TRUSTCHECK_ACTION_CREATE_PR: ${{ inputs['create-pr'] }}
        TRUSTCHECK_ACTION_PR_BASE: ${{ inputs['pr-base'] }}
        TRUSTCHECK_ACTION_PR_BRANCH: ${{ inputs['pr-branch'] }}
        TRUSTCHECK_ACTION_PR_TITLE: ${{ inputs['pr-title'] }}
        TRUSTCHECK_ACTION_PR_READY: ${{ inputs['pr-ready'] }}
        TRUSTCHECK_ACTION_FORMAT: ${{ inputs.format }}
        TRUSTCHECK_ACTION_REPORT_PATH: ${{ inputs['report-path'] }}
      run: python -m trustcheck.github_action

    - name: Upload trustcheck report
      if: always() && steps.trustcheck.outputs['report-path'] != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ inputs['artifact-name'] }}
        path: |
          ${{ steps.trustcheck.outputs['report-path'] }}
          ${{ steps.trustcheck.outputs['patch-path'] }}
        if-no-files-found: error

    - name: Enforce trustcheck result
      if: always()
      shell: bash
      env:
        TRUSTCHECK_EXIT_CODE: ${{ steps.trustcheck.outputs['exit-code'] }}
      run: |
        if [[ ! "$TRUSTCHECK_EXIT_CODE" =~ ^[0-9]+$ ]]; then
          echo "::error::trustcheck did not produce an exit code"
          exit 3
        fi
        exit "$TRUSTCHECK_EXIT_CODE"
